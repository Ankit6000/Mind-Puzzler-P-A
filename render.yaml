services:
  - type: web
    name: puzzle-lens
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 180 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PUZZLE_REFERENCE_DIR
        value: reference
      - key: PYTHONUNBUFFERED
        value: "1"
